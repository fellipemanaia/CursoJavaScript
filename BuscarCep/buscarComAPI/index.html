<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP</title>
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="scripts/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Buscar Endereço pelo CEP</h1>
        <label for="cep">CEP:</label>
        <input type="text" name="" id="cep" placeholder="Digite o CEP">
        <button id="botao-buscar" onclick="buscarCep()">Buscar</button>
        <form class="formulario">
            <label for="rua">Rua:</label>
            <input type="text" name="" id="rua">
            <label for="bairro">Bairro:</label>
            <input type="text" name="" id="bairro">
            <label for="cidade">Cidade</label>
            <input type="text" name="" id="cidade">
            <label for="estado">Estado</label>
            <input type="text" name="" id="estado">
        </form>
    </div>
</body>
</html>
