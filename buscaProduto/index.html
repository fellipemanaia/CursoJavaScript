<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Placa de Vídeo</title>
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="scripts/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Buscar Placa de Vídeo</h1>
        <label for="cep">Placa:</label>
        <input type="text" name="" id="placa" placeholder="Digite a placa">
        <button id="botao-buscar" onclick="buscarPlaca()">Buscar</button>
        <form class="formulario">
            <label for="marca">Marca:</label>
            <input type="text" name="" id="marca">
            <label for="gen">Geração:</label>
            <input type="text" name="" id="gen">
            <label for="memoria">Memória:</label>
            <input type="text" name="" id="memoria">
            <label for="ano">Ano de Lançamento:</label>
            <input type="text" name="" id="ano">
        </form>
    </div>
</body>
</html>
